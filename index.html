<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Explorer 3D</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial, sans-serif;}

body{
  width:100%;
  height:100vh;
  overflow:hidden;
  background:#000;
  color:white;
}

#title{
  position:fixed;
  top:28px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  letter-spacing:16px;
  font-size:38px;
  font-weight:400;
}

#sub{
  position:fixed;
  top:82px;
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  color:#ff6a4a;
  letter-spacing:7px;
  font-size:13px;
  font-weight:bold;
}

.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:210px;
  height:100vh;
  z-index:10;
  background:rgba(0,0,0,.55);
  border-right:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(10px);
  padding-top:35px;
}

.logo{
  padding:25px;
  font-size:25px;
  line-height:1.4;
  letter-spacing:7px;
  font-weight:bold;
  border-bottom:1px solid rgba(255,255,255,.12);
  margin-bottom:25px;
}

.btn{
  width:100%;
  height:64px;
  border:none;
  background:transparent;
  color:#ddd;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 22px;
  letter-spacing:2px;
  font-weight:bold;
  border-left:4px solid transparent;
  transition:.25s;
}

.btn:hover,
.btn.active{
  background:rgba(255,255,255,.08);
  color:#ff6a4a;
  border-left-color:#ff6a4a;
}

.dot{
  width:34px;
  height:34px;
  border-radius:50%;
  box-shadow:inset -8px -8px 12px rgba(0,0,0,.7);
}

.info{
  position:fixed;
  right:45px;
  bottom:45px;
  width:330px;
  z-index:10;
  padding:22px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(0,0,0,.45);
  backdrop-filter:blur(10px);
  border-radius:18px;
}

.info h2{
  letter-spacing:8px;
  font-size:34px;
  margin-bottom:14px;
}

.info p{
  color:#ddd;
  line-height:1.7;
  font-size:14px;
}

.stats{
  margin-top:18px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
}

.card{
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;
  padding:12px;
}

.card small{
  display:block;
  color:#aaa;
  font-size:11px;
  margin-bottom:6px;
}

.card b{
  font-size:15px;
}

canvas{
  display:block;
}

@media(max-width:850px){
  .sidebar{
    width:100%;
    height:auto;
    display:flex;
    overflow-x:auto;
    padding:10px;
    bottom:0;
    top:auto;
    border-right:none;
    border-top:1px solid rgba(255,255,255,.15);
  }

  .logo{display:none;}

  .btn{
    min-width:130px;
    height:58px;
    border-left:none;
    border-bottom:3px solid transparent;
    padding:0 12px;
    font-size:12px;
  }

  .btn.active{
    border-bottom-color:#ff6a4a;
  }

  .info{
    width:90%;
    right:5%;
    bottom:95px;
  }

  #title{
    font-size:25px;
    letter-spacing:9px;
  }
}
</style>
</head>

<body>

<h1 id="title">EARTH</h1>
<div id="sub">EXPLORE THE PLANETS</div>

<div class="sidebar">
  <div class="logo">SPACE<br>EXPLORER</div>

  <button class="btn" data-planet="mercury"><span class="dot" style="background:#aaa"></span>MERCURY</button>
  <button class="btn" data-planet="venus"><span class="dot" style="background:#d99b38"></span>VENUS</button>
  <button class="btn active" data-planet="earth"><span class="dot" style="background:#2d8cff"></span>EARTH</button>
  <button class="btn" data-planet="mars"><span class="dot" style="background:#d94b25"></span>MARS</button>
  <button class="btn" data-planet="jupiter"><span class="dot" style="background:#c99562"></span>JUPITER</button>
  <button class="btn" data-planet="saturn"><span class="dot" style="background:#d6c276"></span>SATURN</button>
  <button class="btn" data-planet="uranus"><span class="dot" style="background:#8ee8ee"></span>URANUS</button>
  <button class="btn" data-planet="neptune"><span class="dot" style="background:#315bff"></span>NEPTUNE</button>
</div>

<div class="info">
  <h2 id="name">EARTH</h2>
  <p id="desc">Earth is our home planet. It has oceans, clouds, land, and life.</p>

  <div class="stats">
    <div class="card"><small>DISTANCE</small><b id="distance">149.6M km</b></div>
    <div class="card"><small>DIAMETER</small><b id="diameter">12,742 km</b></div>
    <div class="card"><small>ORBIT</small><b id="orbit">365 days</b></div>
    <div class="card"><small>GRAVITY</small><b id="gravity">9.8 m/s²</b></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
const planetData = {
  mercury:{
    name:"MERCURY",
    file:"mercury.jpg",
    desc:"Mercury is the smallest planet and the closest planet to the Sun.",
    distance:"57.9M km",
    diameter:"4,879 km",
    orbit:"88 days",
    gravity:"3.7 m/s²",
    glow:"#aaaaaa"
  },
  venus:{
    name:"VENUS",
    file:"venus.jpg",
    desc:"Venus is the hottest planet with thick clouds and extreme pressure.",
    distance:"108.2M km",
    diameter:"12,104 km",
    orbit:"225 days",
    gravity:"8.87 m/s²",
    glow:"#d99b38"
  },
  earth:{
    name:"EARTH",
    file:"earth.jpg",
    desc:"Earth is our home planet. It has oceans, clouds, land, and life.",
    distance:"149.6M km",
    diameter:"12,742 km",
    orbit:"365 days",
    gravity:"9.8 m/s²",
    glow:"#2d8cff"
  },
  mars:{
    name:"MARS",
    file:"mars.jpg",
    desc:"Mars is the red planet, known for rocky deserts and possible signs of ancient water.",
    distance:"227.9M km",
    diameter:"6,779 km",
    orbit:"687 days",
    gravity:"3.71 m/s²",
    glow:"#ff5a32"
  },
  jupiter:{
    name:"JUPITER",
    file:"jupiter.jpg",
    desc:"Jupiter is the largest planet in the solar system with giant storms and colorful bands.",
    distance:"778.5M km",
    diameter:"139,820 km",
    orbit:"12 years",
    gravity:"24.79 m/s²",
    glow:"#c99562"
  },
  saturn:{
    name:"SATURN",
    file:"saturn.jpg",
    desc:"Saturn is famous for its beautiful ring system and golden atmosphere.",
    distance:"1.43B km",
    diameter:"116,460 km",
    orbit:"29 years",
    gravity:"10.44 m/s²",
    glow:"#d6c276"
  },
  uranus:{
    name:"URANUS",
    file:"uranus.jpg",
    desc:"Uranus is an ice giant with a pale blue color and a tilted rotation.",
    distance:"2.87B km",
    diameter:"50,724 km",
    orbit:"84 years",
    gravity:"8.69 m/s²",
    glow:"#8ee8ee"
  },
  neptune:{
    name:"NEPTUNE",
    file:"neptune.jpg",
    desc:"Neptune is a deep blue ice giant with very strong winds.",
    distance:"4.5B km",
    diameter:"49,244 km",
    orbit:"165 years",
    gravity:"11.15 m/s²",
    glow:"#315bff"
  }
};

const scene = new THREE.Scene();
const loader = new THREE.TextureLoader();

/* خلفية النجوم */
loader.load("stars.jpg", function(texture){
  scene.background = texture;
});

/* كاميرا */
const camera = new THREE.PerspectiveCamera(
  55,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.z = 3.4;

/* Renderer */
const renderer = new THREE.WebGLRenderer({
  antialias:true
});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

/* كوكب */
const geometry = new THREE.SphereGeometry(1, 160, 160);
const material = new THREE.MeshStandardMaterial({
  roughness:0.9,
  metalness:0.02
});

const planet = new THREE.Mesh(geometry, material);
scene.add(planet);

/* Glow */
const glowGeo = new THREE.SphereGeometry(1.08, 160, 160);
const glowMat = new THREE.MeshBasicMaterial({
  color:0x2d8cff,
  transparent:true,
  opacity:0.18,
  side:THREE.BackSide
});
const glow = new THREE.Mesh(glowGeo, glowMat);
scene.add(glow);

/* Saturn ring */
const ringGeo = new THREE.RingGeometry(1.25, 1.85, 128);
const ringMat = new THREE.MeshBasicMaterial({
  color:0xd6c276,
  transparent:true,
  opacity:0.55,
  side:THREE.DoubleSide
});
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = Math.PI / 2.7;
ring.visible = false;
scene.add(ring);

/* إضاءة */
const sunLight = new THREE.PointLight(0xffddaa, 4.5, 100);
sunLight.position.set(4, 2.5, 4);
scene.add(sunLight);

const ambientLight = new THREE.AmbientLight(0xffffff, 0.55);
scene.add(ambientLight);

const sideLight = new THREE.DirectionalLight(0x4477ff, 1.1);
sideLight.position.set(-4, 1, 2);
scene.add(sideLight);

/* نجوم إضافية */
const starGeo = new THREE.BufferGeometry();
const starCount = 1200;
const starArr = [];

for(let i=0; i<starCount; i++){
  starArr.push(
    (Math.random() - 0.5) * 90,
    (Math.random() - 0.5) * 90,
    (Math.random() - 0.5) * 90
  );
}

starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starArr, 3));

const starMat = new THREE.PointsMaterial({
  color:0xffffff,
  size:0.035
});

const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

/* تغيير الكوكب */
function changePlanet(key){
  const p = planetData[key];

  document.getElementById("title").innerText = p.name;
  document.getElementById("name").innerText = p.name;
  document.getElementById("desc").innerText = p.desc;
  document.getElementById("distance").innerText = p.distance;
  document.getElementById("diameter").innerText = p.diameter;
  document.getElementById("orbit").innerText = p.orbit;
  document.getElementById("gravity").innerText = p.gravity;

  loader.load(p.file, function(texture){
    material.map = texture;
    material.needsUpdate = true;
  });

  glow.material.color.set(p.glow);

  ring.visible = key === "saturn";

  if(key === "jupiter" || key === "saturn"){
    planet.scale.set(1.18,1.18,1.18);
    glow.scale.set(1.18,1.18,1.18);
  }else{
    planet.scale.set(1,1,1);
    glow.scale.set(1,1,1);
  }

  document.querySelectorAll(".btn").forEach(btn=>{
    btn.classList.remove("active");
    if(btn.dataset.planet === key){
      btn.classList.add("active");
    }
  });
}

/* أزرار */
document.querySelectorAll(".btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    changePlanet(btn.dataset.planet);
  });
});

/* تشغيل البداية */
changePlanet("earth");

/* حركة */
function animate(){
  requestAnimationFrame(animate);

  planet.rotation.y += 0.0035;
  glow.rotation.y += 0.0035;
  ring.rotation.z += 0.001;
  stars.rotation.y += 0.00025;

  renderer.render(scene, camera);
}

animate();

/* Resize */
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
