<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Solar Explorer 3D</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  width:100%;
  height:100vh;
  overflow:hidden;
  background:#000;
  color:white;
}

/* عنوان */
#title{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  letter-spacing:12px;
  font-size:30px;
  z-index:10;
}

#sub{
  position:fixed;
  top:60px;
  left:50%;
  transform:translateX(-50%);
  color:#ff5a3c;
  letter-spacing:5px;
  font-size:12px;
  z-index:10;
}

/* سايدبار */
.sidebar{
  position:fixed;
  left:0;
  top:0;
  width:200px;
  height:100vh;
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(10px);
  border-right:1px solid rgba(255,255,255,.1);
  z-index:10;
  padding-top:20px;
}

.logo{
  padding:20px;
  font-size:20px;
  letter-spacing:5px;
  border-bottom:1px solid rgba(255,255,255,.1);
  margin-bottom:20px;
}

.btn{
  width:100%;
  height:55px;
  background:none;
  border:none;
  color:#ccc;
  display:flex;
  align-items:center;
  gap:10px;
  padding-left:15px;
  cursor:pointer;
}

.btn:hover,
.btn.active{
  background:rgba(255,255,255,.08);
  color:#ff5a3c;
}

/* معلومات */
.info{
  position:fixed;
  right:20px;
  bottom:20px;
  width:300px;
  padding:20px;
  background:rgba(0,0,0,.5);
  border-radius:15px;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,.1);
  z-index:10;
}

.info h2{
  font-size:26px;
  letter-spacing:6px;
}

.info p{
  font-size:13px;
  margin:10px 0;
}

.stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.card{
  background:rgba(255,255,255,.08);
  padding:10px;
  border-radius:10px;
}

/* 📱 موبايل */
@media(max-width:700px){

  .sidebar{
    width:100%;
    height:70px;
    top:auto;
    bottom:0;
    display:flex;
    overflow-x:auto;
    padding:5px;
  }

  .logo{display:none;}

  .btn{
    min-width:100px;
    justify-content:center;
    font-size:12px;
  }

  .info{
    width:90%;
    right:5%;
    bottom:90px;
  }

  #title{
    font-size:20px;
  }
}
</style>
</head>

<body>

<h1 id="title">EARTH</h1>
<div id="sub">EXPLORE THE PLANETS</div>

<div class="sidebar">
  <div class="logo">SPACE<br>EXPLORER</div>

  <button class="btn active" data-planet="earth">Earth</button>
  <button class="btn" data-planet="mars">Mars</button>
  <button class="btn" data-planet="jupiter">Jupiter</button>
  <button class="btn" data-planet="venus">Venus</button>
  <button class="btn" data-planet="mercury">Mercury</button>
  <button class="btn" data-planet="saturn">Saturn</button>
  <button class="btn" data-planet="uranus">Uranus</button>
  <button class="btn" data-planet="neptune">Neptune</button>
</div>

<div class="info">
  <h2 id="name">EARTH</h2>
  <p id="desc">Our home planet.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

<script>
const scene = new THREE.Scene();
const loader = new THREE.TextureLoader();

/* خلفية */
scene.background = loader.load("stars.jpg");

/* كاميرا */
const camera = new THREE.PerspectiveCamera(
  60,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.z = 3;

/* Renderer */
const renderer = new THREE.WebGLRenderer({
  antialias:true,
  powerPreference:"high-performance"
});

renderer.setSize(window.innerWidth, window.innerHeight);

/* أهم تعديل للموبايل */
renderer.setPixelRatio(
  Math.min(window.devicePixelRatio, 1.5)
);

document.body.appendChild(renderer.domElement);

/* كوكب */
const geometry = new THREE.SphereGeometry(1, 160, 160);
const material = new THREE.MeshStandardMaterial();
const planet = new THREE.Mesh(geometry, material);
scene.add(planet);

/* إضاءة */
const light = new THREE.PointLight(0xffffff, 3);
light.position.set(5,5,5);
scene.add(light);

scene.add(new THREE.AmbientLight(0xffffff,0.4));

/* تغيير */
function changePlanet(name){
  material.map = loader.load(name + ".jpg");
  document.getElementById("title").innerText = name.toUpperCase();
}

/* أزرار */
document.querySelectorAll(".btn").forEach(btn=>{
  btn.onclick = ()=>{
    document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    changePlanet(btn.dataset.planet);
  }
});

/* بداية */
changePlanet("earth");

/* حركة */
function animate(){
  requestAnimationFrame(animate);
  planet.rotation.y += 0.003;
  renderer.render(scene, camera);
}
animate();

/* Resize */
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
